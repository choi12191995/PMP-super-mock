<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280" font-family="sans-serif" font-size="12">
  <rect width="500" height="280" fill="#f8fafc" rx="8"/>
  <text x="250" y="25" text-anchor="middle" font-size="16" font-weight="bold">RACI Matrix</text>
  <g stroke="#cbd5e1" fill="none">
    <rect x="120" y="40" width="90" height="30"/><rect x="210" y="40" width="90" height="30"/>
    <rect x="300" y="40" width="90" height="30"/><rect x="390" y="40" width="90" height="30"/>
    <rect x="20" y="70" width="100" height="30"/><rect x="120" y="70" width="90" height="30"/>
    <rect x="210" y="70" width="90" height="30"/><rect x="300" y="70" width="90" height="30"/>
    <rect x="390" y="70" width="90" height="30"/>
    <rect x="20" y="100" width="100" height="30"/><rect x="120" y="100" width="90" height="30"/>
    <rect x="210" y="100" width="90" height="30"/><rect x="300" y="100" width="90" height="30"/>
    <rect x="390" y="100" width="90" height="30"/>
    <rect x="20" y="130" width="100" height="30"/><rect x="120" y="130" width="90" height="30"/>
    <rect x="210" y="130" width="90" height="30"/><rect x="300" y="130" width="90" height="30"/>
    <rect x="390" y="130" width="90" height="30"/>
    <rect x="20" y="160" width="100" height="30"/><rect x="120" y="160" width="90" height="30"/>
    <rect x="210" y="160" width="90" height="30"/><rect x="300" y="160" width="90" height="30"/>
    <rect x="390" y="160" width="90" height="30"/>
  </g>
  <g fill="#1e293b" text-anchor="middle" font-size="11">
    <text x="165" y="60">PM</text><text x="255" y="60">Dev Lead</text>
    <text x="345" y="60">QA Lead</text><text x="435" y="60">Sponsor</text>
    <text x="70" y="90" text-anchor="middle">Requirements</text>
    <text x="165" y="90">R</text><text x="255" y="90">C</text><text x="345" y="90">I</text><text x="435" y="90">A</text>
    <text x="70" y="120" text-anchor="middle">Design</text>
