    <text x="165" y="150">I</text><text x="255" y="150">C</text><text x="345" y="150">R</text><text x="435" y="150">A</text>
    <text x="70" y="180" text-anchor="middle">Deployment</text>
    <text x="165" y="180">R</text><text x="255" y="180">A</text><text x="345" y="180">C</text><text x="435" y="180">I</text>
