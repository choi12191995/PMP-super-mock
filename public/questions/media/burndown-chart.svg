<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" font-family="sans-serif" font-size="12">
  <rect width="500" height="300" fill="#f8fafc" rx="8"/>
  <text x="250" y="25" text-anchor="middle" font-size="16" font-weight="bold">Sprint Burn-down Chart</text>
  <line x1="60" y1="260" x2="460" y2="260" stroke="#94a3b8" stroke-width="1"/>
  <line x1="60" y1="40" x2="60" y2="260" stroke="#94a3b8" stroke-width="1"/>
  <text x="250" y="285" text-anchor="middle">Days</text>
  <text x="20" y="150" text-anchor="middle" transform="rotate(-90,20,150)">Story Points</text>
  <line x1="60" y1="50" x2="460" y2="260" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6"/>
  <polyline points="60,50 120,80 180,75 240,110 300,130 360,170 420,200 460,220" fill="none" stroke="#4f46e5" stroke-width="2.5"/>
  <g font-size="10" fill="#64748b">
    <text x="60" y="275">0</text><text x="120" y="275">1</text><text x="180" y="275">2</text>
    <text x="240" y="275">3</text><text x="300" y="275">4</text><text x="360" y="275">5</text>
    <text x="420" y="275">6</text><text x="460" y="275">7</text>
    <text x="50" y="55" text-anchor="end">50</text><text x="50" y="155" text-anchor="end">25</text>
    <text x="50" y="263" text-anchor="end">0</text>
  </g>
  <circle cx="460" cy="220" r="4" fill="#dc2626"/>
  <text x="460" y="215" text-anchor="middle" fill="#dc2626" font-size="10">20 pts remaining</text>
</svg>
