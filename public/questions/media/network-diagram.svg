<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250" font-family="sans-serif" font-size="11">
  <rect width="600" height="250" fill="#f8fafc" rx="8"/>
  <text x="300" y="22" text-anchor="middle" font-size="14" font-weight="bold">Project Network Diagram</text>
  <g fill="#e2e8f0" stroke="#94a3b8">
    <g id="start"><rect x="20" y="100" width="70" height="40" rx="4"/><text x="55" y="124" fill="#1e293b" text-anchor="middle">Start</text></g>
    <g id="a"><rect x="120" y="50" width="70" height="40" rx="4"/><text x="155" y="74" fill="#1e293b" text-anchor="middle">A (3d)</text></g>
    <g id="b"><rect x="120" y="150" width="70" height="40" rx="4"/><text x="155" y="174" fill="#1e293b" text-anchor="middle">B (5d)</text></g>
    <g id="c"><rect x="240" y="50" width="70" height="40" rx="4"/><text x="275" y="74" fill="#1e293b" text-anchor="middle">C (4d)</text></g>
    <g id="d"><rect x="240" y="150" width="70" height="40" rx="4"/><text x="275" y="174" fill="#1e293b" text-anchor="middle">D (2d)</text></g>
    <g id="e"><rect x="360" y="100" width="70" height="40" rx="4"/><text x="395" y="124" fill="#1e293b" text-anchor="middle">E (6d)</text></g>
    <g id="f"><rect x="480" y="100" width="70" height="40" rx="4"/><text x="515" y="124" fill="#1e293b" text-anchor="middle">End</text></g>
  </g>
  <g stroke="#64748b" fill="none" marker-end="url(#arrow)">
    <line x1="90" y1="120" x2="120" y2="70"/>
    <line x1="90" y1="120" x2="120" y2="170"/>
    <line x1="190" y1="70" x2="240" y2="70"/>
    <line x1="190" y1="170" x2="240" y2="170"/>
    <line x1="310" y1="70" x2="360" y2="120"/>
    <line x1="310" y1="170" x2="360" y2="120"/>
    <line x1="430" y1="120" x2="480" y2="120"/>
  </g>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/></marker></defs>
</svg>
